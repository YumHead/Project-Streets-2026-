<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}BothStreets{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <header class="nav">
      <div class="nav__inner">
        <a class="logo" href="/">BothStreets</a>

        <nav class="nav__links">
          <a href="/latest">Latest</a>
          <a href="/about">About</a>
        </nav>

        <a class="btn btn--ghost" href="/latest">Browse</a>
      </div>
    </header>

    <main class="page">
      {% block content %}{% endblock %}
    </main>

    <footer class="footer">
      <div class="footer__inner">
        <div>© BothStreets</div>
        <div class="muted">Prototype • North America</div>
      </div>
    </footer>
  </body>
</html>
